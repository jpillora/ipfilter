name: Update GeoLite2

on:
  schedule:
    - cron: '0 0 * * 3'  # Weekly on Wednesday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download and convert GeoLite2-Country
        run: |
          # Download MMDB to temp location
          curl -sL -u "${{ secrets.MAXMIND_ACCOUNT_ID }}:${{ secrets.MAXMIND_LICENSE_KEY }}" \
            "https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz" \
            | tar -xzf - --wildcards "*/GeoLite2-Country.mmdb" --strip-components=1

          # Generate iploc binary files from MMDB
          go run ./iploc/generate -mmdb GeoLite2-Country.mmdb -out ./iploc

          # Cleanup temp file
          rm GeoLite2-Country.mmdb

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet iploc/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: peter-evans/create-pull-request@v5
        if: steps.check.outputs.changed == 'true'
        with:
          title: 'Update iploc data from GeoLite2-Country'
          commit-message: 'chore: update iploc data from GeoLite2-Country'
          branch: update-geolite2
          delete-branch: true
