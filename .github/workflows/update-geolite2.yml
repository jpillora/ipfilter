name: Update GeoLite2

on:
  schedule:
    - cron: '0 0 * * 3'  # Weekly on Wednesday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download and convert GeoLite2-Country
        run: |
          curl -sL -u "${{ secrets.MAXMIND_ACCOUNT_ID }}:${{ secrets.MAXMIND_LICENSE_KEY }}" \
            "https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz" \
            | tar -xzf - --wildcards "*/GeoLite2-Country.mmdb" --strip-components=1

          go run ./iploc/generate -mmdb GeoLite2-Country.mmdb -out ./iploc

          rm GeoLite2-Country.mmdb

      - name: Download and convert GeoLite2-ASN
        run: |
          curl -sL -u "${{ secrets.MAXMIND_ACCOUNT_ID }}:${{ secrets.MAXMIND_LICENSE_KEY }}" \
            "https://download.maxmind.com/geoip/databases/GeoLite2-ASN/download?suffix=tar.gz" \
            | tar -xzf - --wildcards "*/GeoLite2-ASN.mmdb" --strip-components=1

          go run ./ipasn/generate -mmdb GeoLite2-ASN.mmdb -out ./ipasn

          rm GeoLite2-ASN.mmdb

      - name: Check for changes and push
        run: |
          if git diff --quiet iploc/ ipasn/; then
            echo "No changes to iploc/ipasn data"
            exit 0
          fi

          echo "Changes detected, committing and tagging..."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MSG_PARTS=()
          if ! git diff --quiet iploc/; then
            git add iploc/
            MSG_PARTS+=("GeoLite2-Country")
          fi
          if ! git diff --quiet ipasn/; then
            git add ipasn/
            MSG_PARTS+=("GeoLite2-ASN")
          fi
          MSG="chore: update $(IFS=' + '; echo "${MSG_PARTS[*]}") data"
          git commit -m "$MSG"

          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Tagging as $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin master --tags
